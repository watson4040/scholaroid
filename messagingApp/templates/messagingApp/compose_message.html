{% extends "base.html" %}
{% block title %}Compose Message{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-pen me-2"></i> Compose New Message</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="recipient" class="form-label">Recipient</label>
                            <select name="recipient" id="recipient" class="form-select" required>
                                <option value="">-- Select a recipient --</option>

                                <!-- Admins -->
                                <optgroup label="Admins">
                                    {% for user in admin_users %}
                                        <option value="{{ user.id }}">{{ user.get_full_name|default:user.username }} ({{ user.role|title }})</option>
                                    {% empty %}
                                        <option value="" disabled>No admins available</option>
                                    {% endfor %}
                                </optgroup>

                                <!-- Teachers -->
                                <optgroup label="Teachers">
                                    {% for user in teacher_users %}
                                        <option value="{{ user.id }}">{{ user.get_full_name|default:user.username }} ({{ user.role|title }})</option>
                                    {% empty %}
                                        <option value="" disabled>No other teachers</option>
                                    {% endfor %}
                                </optgroup>

                                <!-- Parents -->
                                <optgroup label="Parents (of your pupils)">
                                    {% for user in parent_users %}
                                        <option value="{{ user.id }}">{{ user.get_full_name|default:user.username }} ({{ user.role|title }})</option>
                                    {% empty %}
                                        <option value="" disabled>No parents linked to your pupils</option>
                                    {% endfor %}
                                </optgroup>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="subject" class="form-label">Subject</label>
                            <input type="text" name="subject" id="subject" class="form-control" required placeholder="Enter subject...">
                        </div>

                        <div class="mb-3">
                            <label for="body" class="form-label">Message</label>
                            <textarea name="body" id="body" rows="5" class="form-control" required placeholder="Write your message..."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-paper-plane me-1"></i> Send
                            </button>
                            <a href="{% url 'inbox' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
