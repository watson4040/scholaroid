<!-- templates/errors/403.html -->
{% extends "base.html" %}
{% load static %}
{% block title %}403 Forbidden{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/errors-shared.css' %}">
{% endblock %}
{% block content %}
<div class="d-flex justify-content-center align-items-center error-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow-sm border-0 text-center">
      <div class="card-body p-4 p-md-5">
        <div class="display-4 fw-bold text-secondary">403</div>
        <h3 class="mt-2">Access Forbidden</h3>
        <p class="text-muted mb-4">You don’t have permission to view this resource.</p>
        <div class="d-flex gap-2 justify-content-center">
          {% load dashboard_tags %}
          <a href="{% dashboard_url %}" class="btn btn-primary">Go to Dashboard</a>
          <a href="{% url 'home' %}" class="btn btn-outline-secondary">Home</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
