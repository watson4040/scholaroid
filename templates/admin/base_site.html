{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
{% endblock %}

{% block footer %}
  {{ block.super }}
  <script src="{% static 'js/admin.js' %}"></script>
  <script>
    // Keep the active sidebar link highlighted and visible
    (function() {
      const links = document.querySelectorAll('.nav-sidebar .nav-link');
      const currentPath = window.location.pathname;
      
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPath.startsWith(href) && href !== '/dashboard/admin/') {
          link.classList.add('active');
          setTimeout(() => {
            link.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 100);
        } else if (href && currentPath === href) {
          link.classList.add('active');
          setTimeout(() => {
            link.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 100);
        }
      });

      // Ensure the Dashboard link in the top menu is always visible on mobile
      const dashboardLink = document.querySelector('.top-menu .nav-link[href*="/dashboard/admin/"]');
      if (dashboardLink) {
        dashboardLink.style.display = 'inline-block !important';
      }
    })();
  </script>
{% endblock %}
