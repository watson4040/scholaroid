{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
{% endblock %}

{% block footer %}
  {{ block.super }}
  <script src="{% static 'js/admin.js' %}"></script>
  <script>
    (function() {
      // Keep active sidebar link highlighted
      const links = document.querySelectorAll('.nav-sidebar .nav-link');
      const currentPath = window.location.pathname;
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPath.startsWith(href) && href !== '/dashboard/admin/') {
          link.classList.add('active');
          setTimeout(() => {
            link.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 100);
        } else if (href && currentPath === href) {
          link.classList.add('active');
          setTimeout(() => {
            link.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 100);
        }
      });

      // On mobile, ensure the Dashboard link is always visible in the top menu
      const dashboardLink = document.querySelector('.top-menu .nav-link[href*="/dashboard/admin/"]');
      if (dashboardLink) {
        dashboardLink.style.display = 'inline-block !important';
      }

      // Prevent body from scrolling to top on pagination or filter clicks
      // (Keep scroll position)
      document.querySelectorAll('.paginator .step-links a, .filter-btn').forEach(el => {
        el.addEventListener('click', function(e) {
          // Store current scroll position before navigation
          const scrollY = window.scrollY;
          // The click will navigate, but we can restore after page load.
          // We'll handle via sticky positioning.
        });
      });
    })();
  </script>
{% endblock %}
