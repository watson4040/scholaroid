{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
  <!-- FORCE FIXED HEADER AND LAYOUT -->
  <style>
    /* ─── FIXED HEADER ─── */
    #header, .main-header, .navbar, nav.navbar {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 1030 !important;
      background: #fff !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
      display: flex !important;
      flex-wrap: wrap !important;
      align-items: center !important;
      justify-content: space-between !important;
      padding: 6px 16px !important;
      min-height: 52px !important;
      border-bottom: 1px solid #e9ecef !important;
      margin: 0 !important;
      width: 100% !important;
      box-sizing: border-box !important;
    }
    /* ─── HEADER BUTTONS ─── */
    #header .top-menu, .navbar .top-menu {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 4px !important;
      align-items: center !important;
      justify-content: flex-end !important;
      flex: 1 1 auto !important;
    }
    #header .top-menu .nav-link, .navbar .top-menu .nav-link {
      font-size: 0.85rem !important;
      padding: 4px 10px !important;
      display: inline-block !important;
      white-space: nowrap !important;
      color: #333 !important;
    }
    /* ─── SIDEBAR STARTS BELOW HEADER ─── */
    .sidebar, .main-sidebar, .nav-sidebar {
      position: fixed !important;
      top: 52px !important;
      left: 0 !important;
      bottom: 0 !important;
      width: 280px !important;
      overflow-y: auto !important;
      z-index: 1020 !important;
      background: #2c3e50 !important;
    }
    /* ─── MAIN CONTENT ─── */
    body {
      padding-top: 52px !important;
      margin: 0 !important;
      overflow: hidden !important;
    }
    #container, .container {
      display: flex !important;
      height: calc(100vh - 52px) !important;
      overflow: hidden !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    #content, .content {
      flex: 1 !important;
      overflow-y: auto !important;
      padding: 15px 20px !important;
      margin-left: 280px !important; /* match sidebar width */
    }
    /* ─── FLOATING DASHBOARD BUTTON ─── */
    #floating-dashboard-btn {
      position: fixed !important;
      bottom: 24px !important;
      right: 24px !important;
      z-index: 9999 !important;
      background: linear-gradient(135deg, #28a745, #1e7e34) !important;
      color: #fff !important;
      padding: 14px 22px !important;
      border-radius: 60px !important;
      box-shadow: 0 6px 24px rgba(40,167,69,0.45) !important;
      font-size: 15px !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      display: none !important;
      align-items: center !important;
      gap: 8px !important;
      border: none !important;
    }
    #floating-dashboard-btn:hover { transform: scale(1.05); box-shadow: 0 8px 32px rgba(40,167,69,0.55); }
    #floating-dashboard-btn:active { transform: scale(0.95); }
    #floating-dashboard-btn a {
      color: white !important;
      text-decoration: none !important;
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
    }
    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      #content, .content {
        margin-left: 0 !important;
        padding: 8px 10px !important;
      }
      .sidebar, .main-sidebar {
        width: 260px !important;
        transform: translateX(-100%);
        transition: transform 0.3s;
      }
      .sidebar.open, .main-sidebar.open {
        transform: translateX(0);
      }
      #header .top-menu .nav-link {
        font-size: 0.75rem !important;
        padding: 3px 6px !important;
      }
      #floating-dashboard-btn { display: flex !important; }
    }
  </style>
{% endblock %}

{% block footer %}
  {{ block.super }}
  <div id="floating-dashboard-btn">
    <a href="/dashboard/admin/"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  </div>
  <script src="{% static 'js/admin.js' %}"></script>
  <script>
    (function() {
      // ─── HIGHLIGHT ACTIVE SIDEBAR LINK ───
      const links = document.querySelectorAll('.nav-sidebar .nav-link, .sidebar .nav-link');
      const currentPath = window.location.pathname;
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && (currentPath.startsWith(href) && href !== '/dashboard/admin/') || currentPath === href) {
          link.classList.add('active');
        }
      });

      // ─── MOBILE SIDEBAR TOGGLE ───
      const toggleBtn = document.querySelector('.sidebar-toggle, .navbar-toggler');
      const sidebar = document.querySelector('.sidebar, .main-sidebar');
      if (toggleBtn && sidebar) {
        toggleBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          sidebar.classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
          if (window.innerWidth <= 768 && sidebar.classList.contains('open') &&
              !sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
            sidebar.classList.remove('open');
          }
        });
      }
    })();
  </script>
{% endblock %}
