{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ─── FIXED HEADER ─── */
    #header {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 1030 !important;
      background: #fff !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
      display: flex !important;
      flex-wrap: wrap !important;
      align-items: center !important;
      justify-content: space-between !important;
      padding: 6px 16px !important;
      min-height: 52px !important;
      border-bottom: 1px solid #e9ecef !important;
    }
    /* ─── CUSTOM TOGGLE BUTTON (visible only on mobile) ─── */
    .custom-sidebar-toggle {
      display: none !important;
      background: transparent;
      border: none;
      font-size: 1.4rem;
      color: #333;
      cursor: pointer;
      padding: 4px 8px;
      order: 2;
      margin-left: auto;
    }
    @media (max-width: 768px) {
      .custom-sidebar-toggle {
        display: block !important;
      }
    }
    /* ─── SIDEBAR ─── */
    .sidebar, .main-sidebar {
      position: fixed !important;
      top: 52px !important;
      left: 0 !important;
      bottom: 0 !important;
      width: 280px !important;
      overflow-y: auto !important;
      z-index: 1020 !important;
      background: #2c3e50 !important;
    }
    /* ─── MAIN CONTENT – SCROLLABLE VERTICALLY ─── */
    body {
      padding-top: 52px !important;
      margin: 0 !important;
      overflow: hidden !important;
    }
    #container {
      display: flex !important;
      height: calc(100vh - 52px) !important;
      overflow: hidden !important;
      margin: 0 !important;
      padding: 0 !important;
    }
    #content {
      flex: 1 !important;
      overflow-y: auto !important;   /* <<< VERTICAL SCROLL */
      overflow-x: hidden !important;
      padding: 15px 20px !important;
      margin-left: 280px !important;
      min-width: 0 !important;
      width: 100% !important;
      box-sizing: border-box !important;
      height: 100% !important;
    }
    /* ─── TABLES ─── */
    #content table {
      max-width: 100% !important;
      word-wrap: break-word !important;
    }
    #content table td, #content table th {
      word-break: break-word !important;
      max-width: 300px !important;
    }
    /* ─── FLOATING DASHBOARD BUTTON ─── */
    #floating-dashboard-btn {
      position: fixed !important;
      bottom: 24px !important;
      right: 24px !important;
      z-index: 9999 !important;
      background: linear-gradient(135deg, #28a745, #1e7e34) !important;
      color: #fff !important;
      padding: 14px 22px !important;
      border-radius: 60px !important;
      box-shadow: 0 6px 24px rgba(40,167,69,0.45) !important;
      font-size: 15px !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      display: none !important;
      align-items: center !important;
      gap: 8px !important;
      border: none !important;
    }
    #floating-dashboard-btn:hover { transform: scale(1.05); box-shadow: 0 8px 32px rgba(40,167,69,0.55); }
    #floating-dashboard-btn:active { transform: scale(0.95); }
    #floating-dashboard-btn a {
      color: white !important;
      text-decoration: none !important;
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
    }
    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      #content {
        margin-left: 0 !important;
        padding: 8px 10px !important;
      }
      .sidebar, .main-sidebar {
        width: 260px !important;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      .sidebar.open, .main-sidebar.open {
        transform: translateX(0);
      }
      #header .top-menu .nav-link {
        font-size: 0.75rem !important;
        padding: 3px 6px !important;
      }
      #floating-dashboard-btn { display: flex !important; }
    }
  </style>
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
{% endblock %}

{% block footer %}
  {{ block.super }}
  <div id="floating-dashboard-btn">
    <a href="/dashboard/admin/"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  </div>

  <script src="{% static 'js/admin.js' %}"></script>
  <script>
    (function() {
      // ─── ENSURE A TOGGLE BUTTON EXISTS (FALLBACK) ───
      function ensureToggleButton() {
        // Check if there's already a toggle button (custom or default)
        let toggle = document.querySelector('.sidebar-toggle, .navbar-toggler, .custom-sidebar-toggle');
        if (!toggle) {
          // Create custom toggle
          const header = document.getElementById('header');
          if (header) {
            const btn = document.createElement('button');
            btn.className = 'custom-sidebar-toggle';
            btn.innerHTML = '<i class="fas fa-bars"></i>';
            btn.setAttribute('aria-label', 'Toggle menu');
            // Insert before the top-menu
            const topMenu = header.querySelector('.top-menu');
            if (topMenu) {
              header.insertBefore(btn, topMenu);
            } else {
              header.appendChild(btn);
            }
            toggle = btn;
          }
        }
        return toggle;
      }

      const sidebar = document.querySelector('.sidebar, .main-sidebar');
      let toggleBtn = ensureToggleButton();

      if (toggleBtn && sidebar) {
        // Remove old listeners by cloning
        const newToggle = toggleBtn.cloneNode(true);
        toggleBtn.parentNode.replaceChild(newToggle, toggleBtn);
        toggleBtn = newToggle;

        // Toggle sidebar on click
        toggleBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          sidebar.classList.toggle('open');
        });

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(e) {
          if (window.innerWidth <= 768 && sidebar.classList.contains('open') &&
              !sidebar.contains(e.target) && !toggleBtn.contains(e.target)) {
            sidebar.classList.remove('open');
          }
        });

        // Close sidebar when a link inside it is clicked (mobile)
        sidebar.querySelectorAll('a').forEach(link => {
          link.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
              sidebar.classList.remove('open');
            }
          });
        });
      }

      // ─── HIGHLIGHT ACTIVE SIDEBAR LINK ───
      const links = document.querySelectorAll('.nav-sidebar .nav-link, .sidebar .nav-link');
      const currentPath = window.location.pathname;
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && (currentPath.startsWith(href) && href !== '/dashboard/admin/') || currentPath === href) {
          link.classList.add('active');
        }
      });

      // ─── CONTENT HEIGHT ADJUSTMENT ───
      function adjustContentHeight() {
        const header = document.getElementById('header');
        const container = document.getElementById('container');
        if (header && container) {
          const headerHeight = header.offsetHeight;
          container.style.height = (window.innerHeight - headerHeight) + 'px';
        }
      }
      window.addEventListener('resize', adjustContentHeight);
      window.addEventListener('load', adjustContentHeight);
      setTimeout(adjustContentHeight, 100);
    })();
  </script>
{% endblock %}
