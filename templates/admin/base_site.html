{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
  <style>
    /* Ensure the header is always fixed */
    .main-header.navbar {
      position: fixed !important;
      top: 0 !important;
      width: 100% !important;
      z-index: 1030 !important;
      background: #fff !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1) !important;
    }
    /* Push content down so it doesn't hide behind header */
    .content-wrapper {
      margin-top: 56px !important; /* adjust based on header height */
    }
    /* Sidebar stays fixed */
    .main-sidebar {
      position: fixed !important;
      top: 56px !important;
      bottom: 0 !important;
      height: calc(100vh - 56px) !important;
      overflow-y: auto !important;
    }
    @media (max-width: 768px) {
      .main-sidebar {
        top: 0 !important;
        height: 100vh !important;
      }
      .content-wrapper {
        margin-top: 0 !important;
      }
    }
  </style>
{% endblock %}

{% block footer %}
  {{ block.super }}
  <script src="{% static 'js/admin.js' %}"></script>
  <script>
    // Keep the active sidebar link highlighted and visible
    (function() {
      const links = document.querySelectorAll('.nav-sidebar .nav-link');
      const currentPath = window.location.pathname;
      
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPath.startsWith(href) && href !== '/dashboard/admin/') {
          link.classList.add('active');
          setTimeout(() => {
            link.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 150);
        } else if (href && currentPath === href) {
          link.classList.add('active');
          setTimeout(() => {
            link.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 150);
        }
      });
    })();
  </script>
{% endblock %}
