{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
  <style>
    /* ─── FORCE HEADER FIXED ─── */
    #header, .main-header, .navbar, nav.navbar {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 1030 !important;
      background: #fff !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
      display: flex !important;
      flex-wrap: wrap !important;
      align-items: center !important;
      justify-content: space-between !important;
      padding: 6px 16px !important;
      min-height: 52px !important;
      border-bottom: 1px solid #e9ecef !important;
      margin: 0 !important;
      width: 100% !important;
    }
    /* ─── SIDEBAR STARTS BELOW HEADER ─── */
    .sidebar, .main-sidebar, .nav-sidebar {
      margin-top: 52px !important;
      position: sticky !important;
      top: 52px !important;
      height: calc(100vh - 52px) !important;
      overflow-y: auto !important;
      z-index: 1020 !important; /* below header */
    }
    /* ─── CONTENT STARTS BELOW HEADER ─── */
    body {
      padding-top: 52px !important;
      margin: 0 !important;
    }
    #container, .container {
      margin-top: 0 !important;
      padding-top: 0 !important;
    }
    #content {
      padding-top: 0 !important;
    }
    /* ─── ENSURE HEADER BUTTONS ARE VISIBLE ─── */
    #header .top-menu {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 4px !important;
      align-items: center !important;
      flex: 1 1 auto !important;
      justify-content: flex-end !important;
    }
    #header .top-menu .nav-link {
      font-size: 0.85rem !important;
      padding: 4px 10px !important;
      display: inline-block !important;
      white-space: nowrap !important;
      color: #333 !important;
    }
    .top-menu .nav-link[href*="/dashboard/admin/"] {
      font-weight: bold !important;
      color: #28a745 !important;
      background: rgba(40,167,69,0.08) !important;
      border-radius: 20px !important;
    }
    .sidebar-toggle {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      background: transparent !important;
      border: none !important;
      font-size: 1.3rem !important;
      padding: 4px 8px !important;
      cursor: pointer !important;
      flex-shrink: 0 !important;
    }

    /* ─── FLOATING DASHBOARD BUTTON (mobile) ─── */
    #floating-dashboard-btn {
      position: fixed !important;
      bottom: 24px !important;
      right: 24px !important;
      z-index: 9999 !important;
      background: linear-gradient(135deg, #28a745, #1e7e34) !important;
      color: #fff !important;
      padding: 14px 22px !important;
      border-radius: 60px !important;
      box-shadow: 0 6px 24px rgba(40,167,69,0.45) !important;
      font-size: 15px !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      display: none !important;
      align-items: center !important;
      gap: 8px !important;
      border: none !important;
    }
    #floating-dashboard-btn:hover { transform: scale(1.05); box-shadow: 0 8px 32px rgba(40,167,69,0.55); }
    #floating-dashboard-btn:active { transform: scale(0.95); }
    #floating-dashboard-btn a {
      color: white !important;
      text-decoration: none !important;
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
    }
    @media (max-width: 768px) {
      #floating-dashboard-btn { display: flex !important; }
      #header .top-menu { justify-content: flex-start !important; flex-wrap: wrap !important; }
      #header .top-menu .nav-link { font-size: 0.75rem !important; padding: 3px 6px !important; }
      #header .brand { font-size: 0.95rem !important; }
      .sidebar-toggle { margin-left: auto !important; }
    }
  </style>
{% endblock %}

{% block footer %}
  {{ block.super }}
  <div id="floating-dashboard-btn">
    <a href="/dashboard/admin/"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  </div>
  <script src="{% static 'js/admin.js' %}"></script>
  <script>
    // Highlight active sidebar link
    (function() {
      const links = document.querySelectorAll('.nav-sidebar .nav-link');
      const currentPath = window.location.pathname;
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPath.startsWith(href) && href !== '/dashboard/admin/') {
          link.classList.add('active');
        } else if (href && currentPath === href) {
          link.classList.add('active');
        }
      });
    })();
  </script>
{% endblock %}
