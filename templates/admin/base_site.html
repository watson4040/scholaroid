{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="{% static 'css/admin.css' %}">

<style>
  /* ─── PREVENT MAIN CONTENT SCROLLING ─── */
  body {
    overflow: hidden !important;           /* no scrolling at all */
  }
  #container {
    height: calc(100vh - 52px) !important;
    overflow: hidden !important;
  }
  #content {
    overflow: hidden !important;           /* main content does NOT scroll */
    height: 100% !important;
  }

  /* ─── SIDEBAR: SCROLLABLE INDEPENDENTLY ─── */
  .sidebar, .main-sidebar {
    overflow-y: auto !important;           /* sidebar scrolls */
    overflow-x: hidden !important;
    scroll-behavior: smooth !important;
    -webkit-overflow-scrolling: touch !important;
    height: calc(100vh - 52px) !important; /* fill remaining height */
  }

  /* ─── SIDEBAR ACTIVE LINK HIGHLIGHT ─── */
  .nav-sidebar .nav-link.active,
  .sidebar .nav-link.active {
    background: rgba(26, 188, 156, 0.2) !important;
    color: white !important;
    border-left-color: #1abc9c !important;
  }
</style>

{% endblock %}

{% block footer %}
{{ block.super }}

<!-- Mobile Dashboard Button -->
<div id="floating-dashboard-btn">
    <a href="/dashboard/admin/">
        <i class="fas fa-tachometer-alt"></i>
        Dashboard
    </a>
</div>

<!-- Page Loader -->
<div id="page-loader">
    <div class="loader-spinner"></div>
</div>

<script src="{% static 'js/admin.js' %}"></script>

<!-- ─── SIDEBAR ACTIVE LINK SCROLL ─── -->
<script>
  (function() {
    // Highlight active link and scroll it into view within the sidebar
    const links = document.querySelectorAll('.nav-sidebar .nav-link, .sidebar .nav-link');
    const currentPath = window.location.pathname;
    let activeLink = null;
    links.forEach(function(link) {
      const href = link.getAttribute('href');
      if (href && (currentPath.startsWith(href) && href !== '/dashboard/admin/') || currentPath === href) {
        link.classList.add('active');
        activeLink = link;
      }
    });
    if (activeLink) {
      setTimeout(function() {
        activeLink.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }, 100);
    }
  })();
</script>

{% endblock %}
