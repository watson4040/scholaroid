{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
{% endblock %}

{% block footer %}
  {{ block.super }}
  <div id="floating-dashboard-btn">
    <a href="/dashboard/admin/"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  </div>

  <script src="{% static 'js/admin.js' %}"></script>
  <script>
    (function() {
      // ─── DISABLE BROWSER AUTO‑SCROLL RESTORATION ───
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }

      // ─── STORE SCROLL POSITION BEFORE NAVIGATION ───
      document.querySelectorAll('.nav-sidebar .nav-link, .sidebar .nav-link').forEach(link => {
        link.addEventListener('click', function() {
          sessionStorage.setItem('scrollY', window.scrollY);
        });
      });

      // ─── RESTORE SCROLL POSITION IMMEDIATELY ───
      // Run this as soon as possible (before the browser's default scroll)
      function restoreScroll() {
        const saved = sessionStorage.getItem('scrollY');
        if (saved !== null) {
          const y = parseInt(saved, 10);
          if (!isNaN(y) && y > 0) {
            window.scrollTo(0, y);
          }
          sessionStorage.removeItem('scrollY');
        }
      }

      // Try to run on DOMContentLoaded (earlier than load)
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', restoreScroll);
      } else {
        restoreScroll();
      }

      // Also run on load to catch any late restoration
      window.addEventListener('load', restoreScroll);

      // ─── HIGHLIGHT ACTIVE SIDEBAR LINK ───
      const links = document.querySelectorAll('.nav-sidebar .nav-link');
      const currentPath = window.location.pathname;
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPath.startsWith(href) && href !== '/dashboard/admin/') {
          link.classList.add('active');
        } else if (href && currentPath === href) {
          link.classList.add('active');
        }
      });
    })();
  </script>
{% endblock %}
