{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
{% endblock %}

{% block footer %}
  {{ block.super }}
  <script src="{% static 'js/admin.js' %}"></script>
  <script>
    (function() {
      // Keep active sidebar link highlighted and scroll into view
      const links = document.querySelectorAll('.nav-sidebar .nav-link');
      const currentPath = window.location.pathname;
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPath.startsWith(href) && href !== '/dashboard/admin/') {
          link.classList.add('active');
          setTimeout(() => {
            link.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 100);
        } else if (href && currentPath === href) {
          link.classList.add('active');
          setTimeout(() => {
            link.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 100);
        }
      });

      // Prevent auto-scroll to top on pagination/filter clicks (we rely on sticky positioning)
      document.querySelectorAll('.paginator .step-links a, .filter-btn').forEach(el => {
        el.addEventListener('click', function(e) {
          // No action needed – sticky pagination keeps it in view
        });
      });

      // Ensure the Dashboard link is always visible in the sidebar (it's in the custom navigation)
    })();
  </script>
{% endblock %}
