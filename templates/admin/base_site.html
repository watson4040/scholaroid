{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
  {{ block.super }}
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Floating Dashboard button – mobile only */
    #floating-dashboard-btn {
      position: fixed !important;
      bottom: 24px !important;
      right: 24px !important;
      z-index: 9999 !important;
      background: linear-gradient(135deg, #28a745, #1e7e34) !important;
      color: #fff !important;
      padding: 14px 22px !important;
      border-radius: 60px !important;
      box-shadow: 0 6px 24px rgba(40,167,69,0.45) !important;
      font-size: 15px !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      display: none !important;
      align-items: center !important;
      gap: 8px !important;
      border: none !important;
      user-select: none !important;
      transition: transform 0.2s, box-shadow 0.2s !important;
    }
    #floating-dashboard-btn:hover { transform: scale(1.05) !important; box-shadow: 0 8px 32px rgba(40,167,69,0.55) !important; }
    #floating-dashboard-btn:active { transform: scale(0.95) !important; }
    #floating-dashboard-btn a {
      color: white !important;
      text-decoration: none !important;
      display: flex !important;
      align-items: center !important;
      gap: 8px !important;
    }
    @media (max-width: 768px) {
      #floating-dashboard-btn { display: flex !important; }
    }
  </style>
  <link rel="stylesheet" href="{% static 'css/admin.css' %}">
{% endblock %}

{% block footer %}
  {{ block.super }}
  <div id="floating-dashboard-btn">
    <a href="/dashboard/admin/"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  </div>

  <script src="{% static 'js/admin.js' %}"></script>
  <script>
    (function() {
      // ─── DISABLE BROWSER AUTO‑SCROLL RESTORATION ───
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }

      // ─── STORE SCROLL POSITION BEFORE NAVIGATION ───
      document.querySelectorAll('.nav-sidebar .nav-link, .sidebar .nav-link').forEach(link => {
        link.addEventListener('click', function() {
          sessionStorage.setItem('scrollY', window.scrollY);
        });
      });

      // ─── RESTORE SCROLL POSITION ON PAGE LOAD ───
      window.addEventListener('load', function() {
        const saved = sessionStorage.getItem('scrollY');
        if (saved !== null) {
          const y = parseInt(saved, 10);
          if (!isNaN(y) && y > 0) {
            window.scrollTo(0, y);
          }
          sessionStorage.removeItem('scrollY');
        }
      });

      // ─── HIGHLIGHT ACTIVE SIDEBAR LINK ───
      const links = document.querySelectorAll('.nav-sidebar .nav-link');
      const currentPath = window.location.pathname;
      links.forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPath.startsWith(href) && href !== '/dashboard/admin/') {
          link.classList.add('active');
        } else if (href && currentPath === href) {
          link.classList.add('active');
        }
      });
    })();
  </script>
{% endblock %}
